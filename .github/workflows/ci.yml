name: Cross-Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [published]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generator: "Unix Makefiles"
            build_dir: build/linux
            configure_args: "-DCMAKE_BUILD_TYPE=Release"
            build_config: ""
            ctest_config: ""
            cpack_config: Release
            artifact_suffix: linux
            cc: gcc-14
            cxx: g++-14
          - os: macos-latest
            generator: "Unix Makefiles"
            build_dir: build/macos
            configure_args: "-DCMAKE_BUILD_TYPE=Release"
            build_config: ""
            ctest_config: ""
            cpack_config: Release
            artifact_suffix: macos
            cc: ""
            cxx: ""
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            build_dir: build/windows
            configure_args: ""
            build_config: "--config Release"
            ctest_config: "-C Release"
            cpack_config: Release
            artifact_suffix: windows
            cc: ""
            cxx: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S . -B "${{ matrix.build_dir }}" -G "${{ matrix.generator }}" ${{ matrix.configure_args }}

      - name: Build
        run: cmake --build "${{ matrix.build_dir }}" ${{ matrix.build_config }}

      - name: Test
        run: ctest ${{ matrix.ctest_config }} --test-dir "${{ matrix.build_dir }}"

      - name: Package
        working-directory: ${{ matrix.build_dir }}
        run: cpack -G ZIP -C ${{ matrix.cpack_config }}

      - name: Locate package
        id: locate-package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE=$(find "${{ matrix.build_dir }}" -maxdepth 1 -type f -name "*.zip" -print -quit)
          if [ -z "$PACKAGE" ]; then
            echo "No package archive found" >&2
            exit 1
          fi
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: search-${{ matrix.artifact_suffix }}-${{ github.sha }}
          path: |
            ${{ matrix.build_dir }}/bin/**
            ${{ steps.locate-package.outputs.package }}

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.locate-package.outputs.package }}
          asset_name: search-${{ matrix.artifact_suffix }}-${{ github.ref_name }}.zip
          asset_content_type: application/zip
